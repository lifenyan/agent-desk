# Eval floors — the single source of truth consumed by evals/run_evals.py locally AND in CI
# (the workflows run the same harness; there is no second copy of these numbers anywhere).
#
# Philosophy (ADR-026): floors are REGRESSION gates, not perfection gates. Each floor sits
# BELOW its measured baseline by more than observed run-to-run variance, so green means
# "nothing broke" and red always means a real regression — never eval noise. Never loosen an
# enforced floor: the M5 re-derivation (ADR-034) treated the 2026-07-07 post-recalibration
# values as hard lower bounds and found no floor whose baseline justified moving it either way.
#
# Baselines (2026-07-07 M5 full runs, gpt-5-mini + text-embedding-3-small + judge gpt-5 —
# floors are only meaningful against the models that produced them; re-measure before
# changing models). Committed run: evals/results/baseline.json (per-case cost + latency).
#   retrieval  recall@5 1.000 · MRR 0.983 · refusals 8–10/10 across four same-day runs ·
#              false refusals 0
#   routing    accuracy 1.000 (hard 6/6) · ping-pong 0 · integrity 0–1 (the ~1/30 ADR-022 burp)
#   e2e        18 flows; 16/18 on the first run (two harness-design bugs, fixed — ADR-032),
#              then 18/18 on the committed baseline run
#   dedup      10/12 and 9/12 on the M5 runs; historical range 8–12/12 (ADR-028: gray-band
#              judgment is genuinely variable)
#   quality    faithfulness 4.7 / 4.1 / 4.5 · helpfulness 4.9 / 4.4 / 4.8 across three
#              same-day runs — exactly the variance that keeps it report-only (below)

[retrieval]
recall_at_5 = 0.8
# M5 grew the refusal slice 5 -> 10, so this is finally a RATE, not five coin flips (the M4
# addendum's promise). Observed across three same-day agent-mode runs: 10/10, 8/10, 9/10 —
# the misses are gray-band probes ("whiteboard app" at 0.448 vs the 0.45 gate; "3D printer"
# at 0.453) whose refusal hinges on stage-2 judgment, exactly the ADR-017 band working.
# 0.8 tolerates the observed worst run; 3+ misses is contract/gate drift and stays red.
refusal_accuracy = 0.8
false_refusals_max = 0

[routing]
accuracy = 0.9
# ADR-022 documents a residual "empty final message inside a specialist's turn" burp and
# observed it at ~1/30 pre-fix; the first nightly full-30 run (2026-07-07) observed it once
# post-fix too (routing was otherwise perfect: accuracy 1.000, ping-pong 0), and the M5
# subset run saw it once more. A zero floor on a known ~1/30 burp is a perfection gate —
# 1 is tolerance for the burp, 2+ is systematic.
integrity_failures_max = 1

[e2e]
# Every flow is a product contract (order HITL both halves, dedup link/create, citations,
# cache serve, memory carryover, restart survival); one broken flow is a broken product, so
# the floor is all-of-them — now over 18 flows (M5) instead of 6. The two failures on the
# first 18-flow run were harness-design bugs (stage-2 refusal citations; missing nudge turn),
# fixed in the flows per the ADR-027-addendum discipline, not by lowering this floor.
flow_pass_rate = 1.0

[dedup]
# Gray-band (0.60-0.80 cosine) judgment accuracy over 6 link probes + 6 traps. Observed range
# across the first four full runs (2026-07-07, same code): 8/12, ~9/12, ~10/12, 12/12 — the
# gray band is genuinely variable, which is the ADR-028 finding, not noise to hide. The M5
# baseline runs landed inside that range (10/12), so the floor stands. 0.65 sits one flip
# below the worst observed run (8/12 = 0.667 passes; 7/12 = 0.583 fails), so red means
# judgment collapsed, while the nightly REPORT tracks the actual accuracy trend for the
# deferred cross-encoder decision.
accuracy = 0.65

[graph]
# The CTE Graph-RAG arm (incident agent + query_dependency_graph on postgres) scored
# F1 1.000 with 15/15 exact sets on all three same-day baseline runs (2026-07-07, ADR-036) —
# the tool returns the literal answer and the agent relays it. 0.8 sits far below that
# baseline: red means the agent stopped reaching for the graph or systematically garbles its
# output, while a couple of flubbed relays stay green (ADR-026). The rag arm is deliberately
# floor-FREE — it is the comparison baseline (measured F1 0.44-0.64 across the same runs,
# refusal-driven variance), not a product contract. The neo4j arm has no floor either: CI has
# no Neo4j (the arm self-skips); its gate is the LLM-free backend-parity check, which fails
# the suite unconditionally on any (name, depth) mismatch.
cte_f1_mean = 0.8

[slack]
# M8 recorded-fixture ingestion (ADR-039): 5 cases through the real runner code + a live API.
# Final-code baseline (2026-07-07, three runs): 5/5, 4/5, 5/5. The two variable modes are
# exactly the system's known ones, not Slack-specific: the dedup gray band (the link case —
# ADR-028's 8-12/12 finding) and the residual ADR-022 empty-final burp (the one create miss).
# The security-critical cases were perfect across ALL seven baseline runs incl. pre-fix code:
# injection trap 7/7, no-matching-user fallback 7/7, trigger variant 7/7. 0.75 tolerates one
# flipped case (4/5 passes); two failures in one run means the ingestion path itself broke.
case_pass_rate = 0.75

# [quality] — deliberately ABSENT (report-only), per ADR-026's own rule: a floor needs a
# baseline plus observed run-to-run variance, and the first three same-day runs already moved
# 0.6 on faithfulness mean (4.7 -> 4.1 -> 4.5) on identical code — judge-and-agent variance,
# not regression. The suite reports mean + distribution in every nightly; once several
# nightlies show what normal looks like, add e.g. `faithfulness_mean = ...` /
# `helpfulness_mean = ...` here and suite_quality.py gates on them with no code change.
