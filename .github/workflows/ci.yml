# CI gate (M4, ADR-026): lint + format, the full test suite against real pgvector/redis
# service containers (fail LOUDLY if DB-backed tests would silently skip — REQUIRE_DB=1), then
# the cost-capped eval subset with floors read from evals/thresholds.toml (the same file the
# local harness reads; there is no second copy of the numbers). Metrics land in the job
# summary. Target: under 8 minutes wall.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Superseded runs on the same PR/branch are wasted eval spend — cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Mirror docker-compose.yml exactly: same images, same credentials.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: itsm
          POSTGRES_PASSWORD: itsm
          POSTGRES_DB: itsm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itsm -d itsm"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://itsm:itsm@localhost:5432/itsm
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      # A green pipeline that skipped its gates is worse than a red one: the eval subset and
      # the ingest step below NEED the key, so a missing/empty secret must fail HERE, loudly —
      # never as a silently-skipped eval step.
      - name: Require OPENAI_API_KEY secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repo secret is missing or empty — the eval gates cannot run (note: fork PRs get no secrets by design)"
            exit 1
          fi

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Migrate + seed + ingest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          alembic upgrade head
          python scripts/seed_db.py
          python -m app.rag.ingest  # embeds 440 chunks + 300 tickets; ~$0.01 on a cold cache

      # REQUIRE_DB=1: conftest turns an unreachable Postgres into a loud collection failure
      # instead of ~50 silent skips (the green-but-empty trap). -ra prints any skip reasons.
      - name: Tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REQUIRE_DB: "1"
        run: pytest -ra tests/

      # The gate the unit tests can't provide: floors from evals/thresholds.toml, metrics
      # appended to the job summary by the harness itself ($GITHUB_STEP_SUMMARY).
      - name: Eval subset
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m evals.run_evals --subset
