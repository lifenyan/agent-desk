# Nightly full-suite eval run (M4; M5 added the quality suite): retrieval (40) + routing
# (all 30) + e2e (18 flows through a live uvicorn the e2e suite spawns itself) + dedup +
# quality (LLM-as-judge, gpt-5 — ADR-033) — the suites too slow/expensive for every PR
# (ADR-026). workflow_dispatch is the dry-run/on-demand path. Failures notify via GitHub's
# default workflow-failure email — deliberately no extra notification infra.
name: Nightly evals

on:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC daily — off the interactive workday, one run per day
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false # let a running eval finish; results are the point

jobs:
  evals:
    runs-on: ubuntu-latest
    # Generous: wall time is dominated by LLM API latency. The M5 full run (all five suites,
    # 18-flow e2e) measured 37 min locally; the M4-era 6-flow e2e alone varied 5–35 min in CI
    # (each HTTP call individually capped at 240 s), so a 2× CI-latency day on ~34 min of
    # LLM-bound suites needs headroom past the old 60.
    timeout-minutes: 90

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: itsm
          POSTGRES_PASSWORD: itsm
          POSTGRES_DB: itsm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itsm -d itsm"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://itsm:itsm@localhost:5432/itsm
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Require OPENAI_API_KEY secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY repo secret is missing or empty — the eval suites cannot run"
            exit 1
          fi

      - name: Migrate + seed + ingest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          alembic upgrade head
          python scripts/seed_db.py
          python -m app.rag.ingest

      # All five suites (no --suite flag = everything, quality included). The e2e suite spawns
      # its own uvicorn on :8123 in this job's process group and asserts side effects through
      # the real HTTP contract; the full metrics table (incl. per-suite cost + latency
      # p50/p95) lands in the job summary.
      - name: Full eval suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m evals.run_evals
