# Deploy workflow (M4, ADR-029) — shipped INERT, reconciled with ADR-009: the FIRST deploy is
# deliberately manual and has not happened yet (no Railway project, no token, nothing for this
# workflow to talk to). Until then:
#   - push-to-main deploys are gated behind the repo variable DEPLOY_ENABLED == 'true'
#     (Settings → Secrets and variables → Actions → Variables) — one switch arms them;
#   - workflow_dispatch always enters the job but fails LOUDLY at the secrets guard until the
#     required secrets/variables exist (a silent skip would look like a deploy that worked).
# Arming steps + required secrets are documented in DEPLOY.md ("CI deploy"). Live verification
# is deferred until after the manual first deploy (acceptance: actionlint/dry-run only).
name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false # never kill a half-finished deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The arming gate: manual dispatch is always a deliberate human act; push-to-main only
    # deploys once DEPLOY_ENABLED is flipped to 'true'.
    if: github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true'

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}

    steps:
      # Missing configuration must fail the run at the step that needs it — never silently
      # skip and report green (a green "deploy" that deployed nothing is the worst outcome).
      - name: Require deploy secrets and variables
        run: |
          missing=0
          [ -z "$RAILWAY_TOKEN" ] && echo "::error::RAILWAY_TOKEN secret is missing (see DEPLOY.md 'CI deploy')" && missing=1
          [ -z "$RAILWAY_SERVICE" ] && echo "::error::RAILWAY_SERVICE repo variable is missing (the Railway API service name)" && missing=1
          [ -z "$DEPLOY_HEALTH_URL" ] && echo "::error::DEPLOY_HEALTH_URL repo variable is missing (the public API base URL, no trailing slash)" && missing=1
          exit $missing

      - uses: actions/checkout@v4

      # Validate the image builds before touching the platform — a broken Dockerfile should
      # fail here, not during the platform's remote build.
      - name: Build image
        run: docker build -t agentdesk:${{ github.sha }} .

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        run: railway up --service "$RAILWAY_SERVICE" --ci

      # Release step: migrations run against the deployed environment (the image CMD also
      # migrates at boot — this makes the schema step explicit and observable in the log).
      - name: Run migrations (release step)
        run: railway ssh --service "$RAILWAY_SERVICE" -- alembic upgrade head

      # Gate on the real readiness contract: /readyz checks Postgres + Redis and 503s on
      # failure (/health does not exist — see app/api/routes_health.py).
      - name: Wait for /readyz
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "$DEPLOY_HEALTH_URL/readyz"; then
              echo " — ready after ${i} checks"
              exit 0
            fi
            sleep 10
          done
          echo "::error::service never went ready at $DEPLOY_HEALTH_URL/readyz after 5 minutes"
          exit 1
